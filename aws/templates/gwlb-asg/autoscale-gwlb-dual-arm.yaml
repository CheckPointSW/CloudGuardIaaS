---
AWSTemplateFormatVersion: 2010-09-09
Description: |
  Create an Auto Scaling group of Check Point gateways with dual-arm architecture (20260706)
  See CloudGuard Network for AWS Gateway Load Balancer Auto Scaling Group Deployment Guide administration guide for detailed deployment and configuration steps.
Metadata:
  AWS::CloudFormation::Interface:
    ParameterGroups:
      - Label:
          default: Basic Settings
        Parameters:
          - GatewayVersion
          - GatewayInstanceType
          - GatewaySICKey
          - KeyName
          - DeploymentPrefix
      - Label:
          default: VPC Network Settings
        Parameters:
          - VPC
          - IPMode
          - GatewaysPublicSubnets
          - IPAMPoolId
          - GatewaysPrivateSubnets
      - Label:
          default: Advanced Settings
        Parameters:
          - VolumeSize
          - VolumeType
          - EnableVolumeEncryption
          - EnableInstanceConnect
          - MetaDataToken
          - GatewaysMinSize
          - GatewaysMaxSize
          - AdminEmail
          - GatewaysTargetGroups
          - Shell
          - GatewayPasswordHash
          - GatewayMaintenancePasswordHash
          - AllowUploadDownload
          - CloudWatch
          - GatewayBootstrapScript
          - ControlGatewayOverPrivateOrPublicAddress
          - ManagementServer
          - ConfigurationTemplate
    ParameterLabels:
      VPC:
        default: VPC
      GatewaysPublicSubnets:
        default: Gateways public subnets
      GatewaysPrivateSubnets:
        default: Gateways private subnets
      DeploymentPrefix:
        default: Deployment Prefix
      GatewayInstanceType:
        default: Gateways instance type
      KeyName:
        default: Key name
      IPMode:
        default: IP Configuration Mode
      VolumeSize:
        default: Root volume size (GB)
      VolumeType:
        default: Volume Type
      EnableVolumeEncryption:
        default: Enable volume encryption
      EnableInstanceConnect:
        default: Enable AWS Instance Connect
      MetaDataToken:
        default: Metadata HTTP token
      GatewaysMinSize:
        default: Minimum Gateway group size
      GatewaysMaxSize:
        default: Maximum Gateway group size
      AdminEmail:
        default: Email address
      GatewaysTargetGroups:
        default: Gateways target groups
      GatewayVersion:
        default: Gateways version & license
      Shell:
        default: Admin shell
      GatewayPasswordHash:
        default: Gateways Password hash
      GatewayMaintenancePasswordHash:
        default: Gateway Maintenance Password hash
      GatewaySICKey:
        default: Gateways SIC key
      AllowUploadDownload:
        default: Allow upload & download
      CloudWatch:
        default: CloudWatch metrics
      GatewayBootstrapScript:
        default: Gateways bootstrap script
      ControlGatewayOverPrivateOrPublicAddress:
        default: Gateways addresses
      ManagementServer:
        default: Management Server
      ConfigurationTemplate:
        default: Configuration template
Parameters:
  VPC:
    Description: Select an existing VPC.
    Type: AWS::EC2::VPC::Id
    MinLength: 1
  GatewaysPublicSubnets:
    Description: Select at least 2 public subnets in the VPC for the Security Gateways external interfaces.
    Type: List<AWS::EC2::Subnet::Id>
    MinLength: 2
  GatewaysPrivateSubnets:
    Description: Select at least 2 private subnets in the VPC for the Security Gateways internal interfaces.
    Type: List<AWS::EC2::Subnet::Id>
    MinLength: 2
  DeploymentPrefix:
    Description: A prefix for resource names (ASG, Gateway). Will have suffixes added automatically.
    Type: String
    Default: Check-Point
    MaxLength: 20
  GatewayInstanceType:
    Description: The instance type of the Security Gateways.
    Type: String
    Default: c6in.xlarge
